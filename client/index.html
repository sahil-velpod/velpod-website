<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Velpod - AI-Native Infrastructure Platform</title>
    <meta name="description" content="Velpod is building AI-powered infrastructure tooling that helps engineering teams deploy, operate, and manage cloud-native applications with greater confidence and less operational overhead." />
    <meta name="keywords" content="infrastructure, cloud, AI, automation, DevOps, cloud operations, engineering" />
    <meta name="author" content="Velpod" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />
    <meta name="revisit-after" content="7 days" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://velpod.dev/" />
    <meta property="og:title" content="Velpod - AI-Native Infrastructure Platform" />
    <meta property="og:description" content="Intelligent infrastructure tooling for modern engineering teams. Deploy, operate, and manage cloud-native applications with confidence." />
    <meta property="og:image" content="https://d2xsxph8kpxj0f.cloudfront.net/310519663775876534/MEFrF4th6YAXR5ehyBAFVW/velpod-logo-j375HvLVieUkNWDoSmsMF4.webp" />
    <meta property="og:site_name" content="Velpod" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://velpod.dev/" />
    <meta name="twitter:title" content="Velpod - AI-Native Infrastructure Platform" />
    <meta name="twitter:description" content="Intelligent infrastructure tooling for modern engineering teams." />
    <meta name="twitter:image" content="https://d2xsxph8kpxj0f.cloudfront.net/310519663775876534/MEFrF4th6YAXR5ehyBAFVW/velpod-logo-j375HvLVieUkNWDoSmsMF4.webp" />
    
    <!-- Canonical -->
    <link rel="canonical" href="https://velpod.dev/" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
    
    <!-- Favicon -->
    <link rel="icon" href="/image_logo.png" type="image/png" />
    <link rel="shortcut icon" href="/image_logo.png" type="image/png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Velpod",
      "url": "https://velpod.dev",
      "logo": "https://d2xsxph8kpxj0f.cloudfront.net/310519663775876534/MEFrF4th6YAXR5ehyBAFVW/velpod-logo-j375HvLVieUkNWDoSmsMF4.webp",
      "description": "AI-powered infrastructure tooling for modern engineering teams",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "Sales",
        "email": "hello@velpod.dev"
      },
      "sameAs": [],
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "IN"
      }
    }
    </script>
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Velpod",
      "url": "https://velpod.dev",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://velpod.dev/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
